<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Revva — Dealer OS</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F5F2;--sf:#fff;--sf2:#FAFAF8;--bd:#E4E4E0;--bd2:#EDEDEA;
  --tx:#0A0A0A;--sub:#6B6B6B;--hint:#AAAAAA;
  --grn:#16A34A;--grn2:#15803D;--gs:#F0FDF4;--gb:#BBF7D0;
  --amb:#D97706;--as:#FFFBEB;--ab:#FDE68A;--rd:#DC2626;--rs:#FEF2F2;--rb:#FECACA;--bl:#2563EB;
  --sb:#0C0C0C;--sm:rgba(255,255,255,.35);--sbr:rgba(255,255,255,.07);
  --plate:#F7C600;--pink:#1A1500;
  --sans:'Geist',system-ui,sans-serif;
  --r:12px;--rsm:8px;--rlg:16px;
  --sh:0 1px 3px rgba(0,0,0,.05),0 4px 14px rgba(0,0,0,.04);
  --tabh:calc(62px + env(safe-area-inset-bottom));
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-font-smoothing:antialiased}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);overflow:hidden;font-size:15px}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;color:inherit;-webkit-tap-highlight-color:transparent}
input,select{font-family:var(--sans)}
:focus-visible{outline:2px solid var(--grn);outline-offset:2px;border-radius:4px}
.shell{display:flex;height:100vh;height:100dvh}

/* ── SIDEBAR (desktop only) ── */
.sidebar{width:212px;flex-shrink:0;background:var(--sb);display:none;flex-direction:column}
@media(min-width:901px){.sidebar{display:flex}}
.sb-top{padding:20px 18px 16px;border-bottom:1px solid var(--sbr)}
.sb-logo{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.sb-lm{width:27px;height:27px;border-radius:7px;background:var(--grn);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff}
.sb-wm{font-size:.98rem;font-weight:600;color:#fff;letter-spacing:-.3px}
.sb-user{display:flex;align-items:center;gap:9px;cursor:pointer;border-radius:9px;padding:6px;margin:-6px;transition:background .12s}
.sb-user:hover{background:rgba(255,255,255,.05)}
.sb-av{width:28px;height:28px;border-radius:50%;background:rgba(22,163,74,.25);display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;color:#4ade80;flex-shrink:0}
.sb-name{font-size:.72rem;font-weight:600;color:#fff}
.sb-co{font-size:.6rem;color:var(--sm)}
.sb-role{margin-left:auto;font-size:.5rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--pink);background:var(--plate);padding:2px 7px;border-radius:5px}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.sb-sl{font-size:.54rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.22);padding:12px 10px 6px}
.sb-i{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;font-size:.77rem;color:var(--sm);cursor:pointer;transition:all .12s;margin-bottom:1px;min-height:38px}
.sb-i:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.7)}
.sb-i.on{background:rgba(22,163,74,.14);color:#4ade80;font-weight:600}
.sb-i.locked{opacity:.4}
.sb-ic{width:16px;text-align:center;font-size:.8rem}
.sb-badge{margin-left:auto;background:var(--grn);color:#fff;font-size:.56rem;font-weight:700;padding:1px 7px;border-radius:100px}
.sb-badge.hidden{display:none}
.sb-lock{margin-left:auto;font-size:.62rem;opacity:.6}
.sb-bot{padding:13px 18px;border-top:1px solid var(--sbr)}
.sb-st{display:flex;align-items:center;gap:7px;font-size:.64rem;color:var(--sm)}
.sb-dot{width:6px;height:6px;border-radius:50%;background:var(--grn);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:56px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;gap:10px}
@media(min-width:901px){.topbar{height:60px;padding:0 24px}}
.tl{display:flex;align-items:center;gap:10px;min-width:0}
.t-logo{width:26px;height:26px;border-radius:7px;background:var(--grn);display:flex;align-items:center;justify-content:center;font-size:.66rem;font-weight:700;color:#fff;flex-shrink:0}
@media(min-width:901px){.t-logo{display:none}}
.ptitle{font-size:.98rem;font-weight:600;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcrumb{font-size:.68rem;color:var(--hint);white-space:nowrap;display:none}
@media(min-width:640px){.pcrumb{display:inline}}
.tr{display:flex;gap:8px;align-items:center;flex-shrink:0}
.t-report{display:none}
@media(min-width:901px){.t-report{display:inline-flex}}
.t-av{width:34px;height:34px;border-radius:50%;background:var(--sb);color:#4ade80;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;cursor:pointer;border:2px solid var(--bd);flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:16px 16px calc(var(--tabh) + 24px);-webkit-overflow-scrolling:touch}
@media(min-width:901px){.content{padding:22px 24px 60px}}

/* ── BOTTOM TAB BAR (mobile) ── */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:45;background:rgba(255,255,255,.94);backdrop-filter:blur(16px);border-top:1px solid var(--bd);display:grid;grid-template-columns:repeat(5,1fr);padding:6px 6px calc(6px + env(safe-area-inset-bottom));align-items:end}
@media(min-width:901px){.tabbar{display:none}}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;font-size:.56rem;font-weight:600;color:var(--hint);border-radius:10px;min-height:48px;justify-content:center;position:relative}
.tab.on{color:var(--grn)}
.tab-ic{font-size:1.05rem;line-height:1}
.tab-add{transform:translateY(-12px)}
.tab-add .tab-ic{width:48px;height:48px;border-radius:50%;background:var(--grn);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.4rem;box-shadow:0 8px 22px rgba(22,163,74,.4)}
.tab-badge{position:absolute;top:2px;right:50%;transform:translateX(16px);background:var(--rd);color:#fff;font-size:.5rem;font-weight:800;min-width:15px;height:15px;border-radius:100px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.tab-badge.hidden{display:none}

/* ── BOTTOM SHEET ── */
.sheet-bg{position:fixed;inset:0;background:rgba(10,10,10,.4);z-index:80;opacity:0;pointer-events:none;transition:opacity .22s}
.sheet-bg.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:81;background:var(--sf);border-radius:20px 20px 0 0;padding:10px 18px calc(20px + env(safe-area-inset-bottom));transform:translateY(105%);transition:transform .3s cubic-bezier(.16,1,.3,1);max-height:82dvh;overflow-y:auto;box-shadow:0 -16px 50px rgba(0,0,0,.2)}
.sheet.on{transform:none}
@media(min-width:901px){.sheet{left:50%;right:auto;bottom:auto;top:50%;transform:translate(-50%,-50%) scale(.96);width:min(480px,92vw);border-radius:18px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-height:80vh;padding:10px 22px 22px}
.sheet.on{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:auto}}
.sheet-grip{width:40px;height:4px;background:var(--bd);border-radius:2px;margin:6px auto 14px}
@media(min-width:901px){.sheet-grip{display:none}}
.sheet-t{font-size:.92rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.sheet-x{color:var(--hint);font-size:1rem;padding:6px;min-width:36px;text-align:right}
.sh-i{display:flex;align-items:center;gap:13px;padding:13px 4px;border-bottom:1px solid var(--bd2);font-size:.85rem;font-weight:500;min-height:52px}
.sh-i:last-child{border-bottom:none}
.sh-i .ic{width:34px;height:34px;border-radius:10px;background:var(--sf2);border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.sh-i .meta{flex:1;min-width:0}
.sh-i .sub{font-size:.66rem;color:var(--hint);font-weight:400;margin-top:1px}
.sh-i .lock{margin-left:auto;font-size:.7rem;color:var(--hint)}
.sh-i .badge{margin-left:auto;background:var(--grn);color:#fff;font-size:.56rem;font-weight:700;padding:2px 8px;border-radius:100px}
.role-i{display:flex;align-items:center;gap:13px;padding:13px 4px;border-bottom:1px solid var(--bd2);min-height:60px}
.role-i:last-child{border-bottom:none}
.role-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.66rem;font-weight:700;color:#fff;flex-shrink:0}
.role-n{font-size:.84rem;font-weight:600}
.role-d{font-size:.66rem;color:var(--hint);margin-top:1px}
.role-on{margin-left:auto;font-size:.62rem;font-weight:700;color:var(--grn)}
.role-pick{margin-left:auto}

/* ── SHARED COMPONENTS ── */
.btn{border-radius:100px;font-weight:600;transition:all .14s;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:40px}
.btn-p{background:var(--grn);color:#fff;padding:8px 18px;font-size:.78rem}
.btn-p:hover{background:var(--grn2)}
.btn-g{background:var(--sf);color:var(--tx);border:1px solid var(--bd);padding:7px 16px;font-size:.76rem}
.btn-g:hover{border-color:#ccc}
.btn-sm{padding:5px 13px;font-size:.7rem;min-height:34px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.pill{font-size:.6rem;font-weight:700;padding:3px 9px;border-radius:100px;white-space:nowrap}
.p-live{background:var(--gs);color:var(--grn);border:1px solid var(--gb)}
.p-draft{background:#F3F4F6;color:#6B7280;border:1px solid #E5E7EB}
.p-sold{background:#EEF2FF;color:#4F46E5;border:1px solid #C7D2FE}
.p-hot{background:var(--rs);color:var(--rd);border:1px solid var(--rb)}
.p-warm{background:var(--as);color:var(--amb);border:1px solid var(--ab)}
.p-cold{background:#F3F4F6;color:#6B7280;border:1px solid #E5E7EB}
.p-won{background:var(--gs);color:var(--grn);border:1px solid var(--gb)}
.p-lost{background:#F3F4F6;color:#9CA3AF;border:1px solid #E5E7EB}
.p-req{background:var(--as);color:var(--amb);border:1px solid var(--ab)}
.panel{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.ph{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--bd2);gap:10px}
.pt{font-size:.8rem;font-weight:600}
.pbody{padding:4px 0}
.grid2{display:grid;grid-template-columns:1fr;gap:16px;align-items:start}
@media(min-width:901px){.grid2{grid-template-columns:1.45fr 1fr;gap:18px}}
.grid-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
@media(min-width:901px){.grid-stats{grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}}
.stat{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 15px;box-shadow:var(--sh)}
@media(min-width:901px){.stat{padding:16px 18px}}
.stat-n{font-size:1.4rem;font-weight:700;letter-spacing:-.04em;line-height:1.1}
@media(min-width:901px){.stat-n{font-size:1.55rem}}
.stat-n .u{font-size:.8rem;color:var(--sub);font-weight:500}
.stat-l{font-size:.62rem;color:var(--sub);margin-top:3px}
.stat-d{font-size:.58rem;font-weight:600;margin-top:6px}
.d-up{color:var(--grn)}.d-dn{color:var(--rd)}.d-nt{color:var(--hint)}
.greet{margin-bottom:14px}
.greet-h{font-size:1.25rem;font-weight:700;letter-spacing:-.03em}
.greet-s{font-size:.7rem;color:var(--hint);margin-top:2px}
@media(min-width:901px){.greet{display:none}}
.ai-bar{background:var(--sb);border-radius:var(--r);padding:13px 15px;display:flex;align-items:center;gap:11px;margin-bottom:16px;cursor:pointer;transition:transform .14s}
.ai-bar:active{transform:scale(.99)}
.ai-spark{width:30px;height:30px;border-radius:8px;background:rgba(22,163,74,.2);display:flex;align-items:center;justify-content:center;color:#4ade80;font-size:.85rem;flex-shrink:0}
.ai-txt{font-size:.74rem;color:rgba(255,255,255,.78);line-height:1.45;min-width:0}
.ai-txt b{color:#fff;font-weight:600}
.ai-go{margin-left:auto;color:#4ade80;font-size:.7rem;font-weight:600;white-space:nowrap;flex-shrink:0}
.srow{display:flex;align-items:center;gap:11px;padding:11px 16px;border-bottom:1px solid var(--bd2);cursor:pointer}
.srow:active{background:var(--sf2)}
.srow:last-child{border-bottom:none}
.ci{width:36px;height:36px;border-radius:9px;background:var(--sf2);border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.cif{flex:1;min-width:0}
.cn{font-size:.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cm{font-size:.62rem;color:var(--sub);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cp{text-align:right;flex-shrink:0}
.cprice{font-size:.8rem;font-weight:700;letter-spacing:-.02em}
.cf{font-size:.58rem;font-weight:600;margin-top:2px;cursor:pointer;border-radius:6px;padding:2px 7px;display:inline-block;min-height:22px}
.cfl{color:var(--amb);background:var(--as)}
.cfr{color:var(--grn);background:var(--gs)}
.cfo{color:var(--hint)}
.lrow{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--bd2);cursor:pointer}
.lrow:active{background:var(--sf2)}.lrow:last-child{border-bottom:none}
.lav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;color:#fff;flex-shrink:0}
.lif{flex:1;min-width:0}
.lname{font-size:.76rem;font-weight:600}
.lcar{font-size:.62rem;color:var(--sub);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.iw{flex-shrink:0;width:56px}
.ib{height:3px;background:var(--bd2);border-radius:2px;overflow:hidden;margin-bottom:3px}
.if2{height:100%;border-radius:2px}
.ip{font-size:.56rem;color:var(--hint);text-align:right}
.act{display:flex;gap:10px;padding:10px 16px;border-bottom:1px solid var(--bd2);font-size:.68rem;color:var(--sub);line-height:1.45}
.act:last-child{border-bottom:none}
.act b{color:var(--tx);font-weight:600}
.act-ic{flex-shrink:0;width:24px;height:24px;border-radius:7px;background:var(--sf2);border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:.64rem}
.act-t{font-size:.56rem;color:var(--hint);white-space:nowrap;margin-left:auto;padding-left:8px}

/* ── ADD FLOW ── */
.flowbar{display:flex;align-items:center;margin-bottom:18px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:11px 14px;box-shadow:var(--sh);overflow-x:auto}
.flow-step{display:flex;align-items:center;gap:7px;opacity:.45;flex-shrink:0}
.flow-step.active,.flow-step.done{opacity:1}
.fs-num{width:22px;height:22px;border-radius:50%;background:var(--bd2);display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;color:var(--sub);flex-shrink:0}
.flow-step.active .fs-num{background:var(--sb);color:#fff}
.flow-step.done .fs-num{background:var(--gs);color:var(--grn);border:1px solid var(--gb)}
.fs-label{font-size:.66rem;font-weight:600;white-space:nowrap}
.flow-line{flex:1;height:1px;background:var(--bd2);margin:0 9px;min-width:10px}
.lookup-card{max-width:520px;margin:18px auto 0;text-align:center}
@media(min-width:901px){.lookup-card{margin-top:36px}}
.lu-eyebrow{font-size:.6rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--hint);margin-bottom:14px}
.lu-plate-wrap{display:flex;gap:9px;justify-content:center;margin-bottom:8px}
.lu-input{background:var(--plate);border:3px solid rgba(0,0,0,.12);border-radius:10px;font-size:clamp(1.2rem,5.5vw,1.6rem);font-weight:700;letter-spacing:.12em;text-align:center;padding:12px 8px;flex:1;max-width:280px;min-width:0;text-transform:uppercase;outline:none;color:var(--pink)}
.lu-input::placeholder{color:rgba(26,21,0,.32)}
.lu-btn{background:var(--sb);color:#fff;border-radius:10px;padding:0 18px;font-size:.78rem;font-weight:600;min-height:52px}
.lu-hint{font-size:.64rem;color:var(--hint);margin-bottom:22px}
.lu-hint b{color:var(--sub);cursor:pointer;text-decoration:underline dotted;padding:4px 0;display:inline-block}
.v-reveal{opacity:0;transform:translateY(10px);transition:all .4s cubic-bezier(.16,1,.3,1);pointer-events:none;text-align:left}
.v-reveal.on{opacity:1;transform:none;pointer-events:auto}
.v-ok{display:flex;align-items:center;gap:10px;background:var(--gs);border:1px solid var(--gb);border-radius:var(--r);padding:12px 14px;margin-bottom:12px}
.v-tick{width:26px;height:26px;border-radius:50%;background:var(--grn);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.66rem;font-weight:700;flex-shrink:0}
.v-ot{font-size:.78rem;font-weight:700}.v-os{font-size:.62rem;color:var(--sub);margin-top:1px}
.v-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
@media(min-width:640px){.v-grid{grid-template-columns:repeat(4,1fr)}}
.v-cell{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rsm);padding:9px 11px}
.v-k{font-size:.52rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--hint)}
.v-v{font-size:.72rem;font-weight:600;margin-top:2px}
.v-cta-row{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}
.photos-grid{display:grid;grid-template-columns:1fr;gap:16px;align-items:start}
@media(min-width:901px){.photos-grid{grid-template-columns:1.5fr 1fr;gap:18px}}
.upload-zone{border:2px dashed var(--bd);border-radius:var(--r);padding:22px;text-align:center;background:var(--sf);cursor:pointer}
.uz-ic{font-size:1.5rem;margin-bottom:6px}
.uz-t{font-size:.78rem;font-weight:600}
.uz-s{font-size:.62rem;color:var(--sub);margin:4px 0 12px}
.uz-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.uz-btn{border:1px solid var(--bd);background:var(--sf);border-radius:100px;padding:9px 16px;font-size:.7rem;font-weight:600;min-height:40px}
.uz-btn.primary{background:var(--sb);color:#fff;border-color:var(--sb)}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:13px}
@media(min-width:640px){.pgrid{grid-template-columns:repeat(4,1fr)}}
.pcell{aspect-ratio:4/3;border-radius:9px;position:relative;overflow:hidden;border:1px solid var(--bd2);animation:popcell .3s cubic-bezier(.34,1.4,.64,1) both}
@keyframes popcell{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.pcell .ai-stamp{position:absolute;bottom:4px;left:4px;background:rgba(22,163,74,.92);color:#fff;font-size:.44rem;font-weight:800;padding:1px 5px;border-radius:3px}
.pcell .hero-stamp{position:absolute;top:4px;left:4px;background:rgba(10,10,10,.8);color:#fff;font-size:.44rem;font-weight:700;padding:1px 6px;border-radius:3px}
.photo-empty{aspect-ratio:4/3;border:2px dashed var(--bd);border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--hint)}
.pe-icon{font-size:.95rem}.pe-label{font-size:.54rem;font-weight:600}
.score-ring{display:flex;align-items:center;gap:13px;padding:14px 16px;border-bottom:1px solid var(--bd2)}
.ring{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ring-in{width:44px;height:44px;border-radius:50%;background:var(--sf);display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:700}
.sc-row{display:flex;align-items:center;gap:10px;padding:7px 16px;font-size:.68rem}
.sc-k{width:70px;color:var(--sub);flex-shrink:0}
.sc-bar{flex:1;height:4px;background:var(--bd2);border-radius:2px;overflow:hidden}

function paintPhotoState(en){
  const d=state.draft;if(!d)return;
  const g=document.getElementById('pgrid');if(!g)return;
  let cells='';
  for(let i=0;i<d.photos;i++)cells+=`<div class="pcell" style="background:${photoGrad(i)}">${i===0?'<div class="hero-stamp">HERO</div>':''}<div class="ai-stamp">✦ AI</div></div>`;
  const need=[['📷','Interior'],['📷','Boot'],['📷','Wheels'],['📷','Dash']];
  for(let i=d.photos;i<8;i++){const l=need[(i-d.photos)%4];cells+=`<div class="photo-empty" onclick="simUpload(1)"><div class="pe-icon">${l[0]}</div><div class="pe-label">${l[1]}</div></div>`;}
  g.innerHTML=cells;
  const q=Math.min(d.photos/8,1)*100,cov=Math.min(d.photos/6,1)*100,bri=d.photos?92:0,con=d.photos?88:0;
  const score=Math.round(q*.35+cov*.3+bri*.2+con*.15);d.photoScore=score;
  const col=score>=80?'var(--grn)':score>=50?'#F59E0B':'var(--bd)';
  document.getElementById('ringO').style.background=`conic-gradient(${col} 0deg ${score*3.6}deg, var(--bd2) ${score*3.6}deg 360deg)`;
  document.getElementById('ringV').textContent=score;
  document.getElementById('scRows').innerHTML=[['Quantity',q,d.photos+'/8'],['Coverage',cov,''],['Brightness',bri,''],['Consistency',con,'']].map(([k,v,lab])=>`<div class="sc-row"><div class="sc-k">${k}</div><div class="sc-bar"><div class="sc-fill" style="width:${v}%;background:${v>=80?'var(--grn)':v>=50?'#F59E0B':'var(--bd)'}"></div></div><div class="sc-v">${lab||Math.round(v)+'%'}</div></div>`).join('');
  const sug=[];
  if(d.photos===0)sug.push(['💡','Upload at least 6 photos — 10+ gets 2.8× more enquiries','']);
  if(d.photos>0&&d.photos<6)sug.push(['📷','Add interior + boot — interior shots get 40% more clicks','Add →','simUpload(2)']);
  if(d.photos>=6&&d.photos<8)sug.push(['✦','Two more angles hits the top quality tier','Add →','simUpload(2)']);
  if(d.photos>0)sug.push(['✓','AI set the front three-quarter as hero — tests best for '+d.make,'']);
  if(d.photos>=8)sug.push(['🏆','Full coverage — outperforms 90% of comparable listings','']);
  document.getElementById('aiSug').innerHTML=sug.map(s=>`<div class="asi"><div>${s[0]}</div><div>${s[1]}</div>${s[2]?`<div class="asi-action" onclick="${s[3]}">${s[2]}</div>`:''}</div>`).join('');
  const btn=document.getElementById('photosNext');if(btn)btn.disabled=d.photos<4;
  if(en&&d.photos===4)toast('✦ 4 photos enhanced — continue, or add more','✦');
}

  c.rec=null;rerender();
  toast(`✓ ${c.model.split(' ').slice(0,2).join(' ')} repriced to ${fmt(c.price)} — live on all platforms`,'✦');
}
function requestApproval(id){
  const c=carById(id);if(!c||!c.rec)return;
  if(c.rec.requested){toast('Already requested — James will see it in Pricing','⏳');return;}
  c.rec.requested=true;
  state.activity.unshift({ic:'⏳',txt:`<b>Sophie</b> requested a price ${c.rec.type} of ${fmt(c.rec.amt)} on the <b>${c.make} ${c.model}</b> — awaiting owner approval`,t:'Just now'});
  rerender();
  toast('Request sent to James — he\u2019ll see it in Pricing','⏳');
}
function dismissRec(id){
  const c=carById(id);if(!c)return;
  c.rec=null;rerender();
  toast('Dismissed — Revva re-checks tonight','✓');
}

/* ═══ LEADS — split desktop, drill-down mobile ═══ */
function renderLeads(){
  const f=state.leadFilter;
  let list=state.leads;
  if(f==='hot')list=list.filter(l=>l.score>=80);
  if(f==='warm')list=list.filter(l=>l.score>=55&&l.score<80);
  if(f==='new')list=list.filter(l=>l.status==='new');
  if(['at','fb','eb','ws'].includes(f))list=list.filter(l=>l.platform===f);
  if(!list.find(l=>l.id===state.activeLead)&&list.length)state.activeLead=list[0].id;
  const a=state.leads.find(l=>l.id===state.activeLead)||list[0];
  document.getElementById('s-leads').innerHTML=`
  <div class="f-row" style="margin-bottom:12px">${[['all','All ('+state.leads.length+')'],['new','Unreplied'],['hot','🔥 Hot'],['warm','Warm'],['at','Auto Trader'],['fb','Facebook'],['eb','eBay'],['ws','Website']].map(([k,lab])=>`<button class="fb2 ${f===k?'on':''}" onclick="state.leadFilter='${k}';renderLeads()">${lab}</button>`).join('')}</div>
  <div class="leads-split">
    <div class="panel leads-list">${list.map(l=>{return `
      <div class="lli ${a&&l.id===a.id&&!isMobile()?'on':''}" onclick="pickLead('${l.id}')">
        <div class="lli-t"><div class="lli-av" style="background:${l.bg}">${l.initials}</div><div class="lli-n">${l.name}</div><div class="lli-tm">${l.time}</div></div>
        <div class="lli-c">${l.preview}</div>
        <div class="lli-f"><span class="src ${PLATFORM_META[l.platform].cls}">${PLATFORM_META[l.platform].name}</span>${scorePill(l.score)}${l.status==='replied'?'<span style="font-size:.54rem;color:var(--grn);margin-left:auto;font-weight:700">✓ Replied</span>':l.status==='won'?'<span class="pill p-won" style="margin-left:auto">Won</span>':l.status==='lost'?'<span class="pill p-lost" style="margin-left:auto">Lost</span>':''}</div>
      </div>`}).join('')||'<div class="empty">No leads match this filter</div>'}
    </div>
    <div class="ld-desktop">${a?leadDetail(a):'<div class="panel empty">Select a lead</div>'}</div>
  </div>`;
}
function pickLead(id){
  state.activeLead=id;
  if(isMobile())openLeadOverlay(id);
  else renderLeads();
}
function openLeadIfMobile(id){if(id&&isMobile())openLeadOverlay(id);}
function openLeadOverlay(id){
  const l=state.leads.find(x=>x.id===id);if(!l)return;
  document.getElementById('ldoTitle').textContent=l.name;
  document.getElementById('ldoBody').innerHTML=leadDetail(l);
  document.getElementById('ldOverlay').classList.add('on');
}
function closeLeadOverlay(){document.getElementById('ldOverlay').classList.remove('on');}
function leadDetail(l){
  const c=carById(l.carId);
  return `<div class="panel ld-detail">
    <div class="ldh">
      <div class="ldh-av" style="background:${l.bg}">${l.initials}</div>
      <div><div class="ldh-n">${l.name}</div><div class="ldh-m">${c?c.year+' '+c.make+' '+c.model:''} · ${PLATFORM_META[l.platform].name}</div></div>
      <div class="ldh-actions">${l.status!=='won'?`<button class="btn btn-g btn-sm" onclick="leadOutcome('${l.id}','won')">Won 🎉</button>`:''}${l.status!=='lost'&&l.status!=='won'?`<button class="btn btn-g btn-sm" onclick="leadOutcome('${l.id}','lost')">Lost</button>`:''}</div>
    </div>
    <div class="int-card"><div class="int-n">${l.score}%</div><div class="int-bw"><div class="int-b"><div class="int-f" style="width:${l.score}%"></div></div><div class="int-r">✦ ${l.note}</div></div></div>
    <div class="conv">${l.thread.map(m=>`<div class="msg ${m.who}"><div><div class="bub">${m.txt}</div><div class="mt2">${m.ai?'<span class="ats">✦ Revva AI ·</span> ':''}${m.meta}</div></div></div>`).join('')}</div>
    ${l.status==='new'||l.status==='replied'?`
    <div class="ai-sug">
      <div class="ai-sug-l">✦ AI suggested follow-up</div>
      <div class="ai-sug-t">"${l.reply}"</div>
      <div class="ai-sug-btns"><button class="sbtn" onclick="sendReply('${l.id}')">✓ Send now</button><button class="ebtn" onclick="editReply('${l.id}')">Edit first</button></div>
    </div>`:`<div class="ai-sug" style="background:var(--sf2)"><div class="ai-sug-l" style="color:var(--sub)">Closed — marked ${l.status}</div></div>`}
  </div>`;
}
function refreshLeadViews(id){
  if(isMobile()&&document.getElementById('ldOverlay').classList.contains('on'))openLeadOverlay(id);
  if(current==='leads')renderLeads();
  syncChrome();
}
function sendReply(id){
  const l=state.leads.find(x=>x.id===id);if(!l)return;
  l.thread.push({who:'out',txt:l.reply,meta:'Just now · sent by '+user().name.split(' ')[0],ai:true});
  l.status='replied';
  l.reply='Thanks '+l.name.split(' ')[0]+' — see you then. I will confirm by text shortly.';
  state.activity.unshift({ic:'✉️',txt:`AI follow-up sent to <b>${l.name}</b> by ${user().name.split(' ')[0]}`,t:'Just now'});
  refreshLeadViews(id);
  toast('✓ Sent via '+PLATFORM_META[l.platform].name,'✉️');
}
function editReply(id){
  const l=state.leads.find(x=>x.id===id);if(!l)return;
  const v=prompt('Edit the reply before sending:',l.reply);
  if(v&&v.trim()){l.reply=v.trim();sendReply(id);}
}
function leadOutcome(id,outcome){
  const l=state.leads.find(x=>x.id===id);if(!l)return;
  l.status=outcome;
  state.activity.unshift({ic:outcome==='won'?'🎉':'◌',txt:`<b>${l.name}</b> marked ${outcome} by ${user().name.split(' ')[0]}`,t:'Just now'});
  refreshLeadViews(id);
  toast(outcome==='won'?'🎉 Won — mark the car sold in Stock to close the loop':'Marked lost — AI notes the pattern','✓');
}

/* ═══ PUBLISHING ═══ */
function renderPublish(){
  const live=state.cars.filter(c=>c.status==='live');
  const on=Object.entries(state.platforms).filter(([k,v])=>v).map(([k])=>k);
  document.getElementById('s-publish').innerHTML=`
  <div class="pub-grid">${Object.entries(PLATFORM_META).map(([k,p])=>`
    <div class="pub-card ${state.platforms[k]?'live':'off'}"><div class="pub-logo" style="background:${p.bg}">${p.logo}</div><div class="pub-nm">${p.name}</div><div class="pub-st">${state.platforms[k]?'● '+live.length+' listings':'Off'}</div></div>`).join('')}
  </div>
  <div class="panel">
    <div class="ph"><div class="pt">Publishing status</div><button class="btn btn-p btn-sm" onclick="go('add')">+ Add</button></div>
    <div class="pbody">${state.cars.filter(c=>c.status!=='draft').map(c=>`
      <div class="srow" onclick="openCar('${c.id}')">
        <div class="ci">${c.emoji}</div>
        <div class="cif"><div class="cn">${c.make} ${c.model}</div><div class="cm">${c.reg} · ${c.status==='live'?on.map(k=>PLATFORM_META[k].logo).join(' · ')+' live':'removed from platforms'}</div></div>
        <div class="cp"><div class="cprice">${fmt(c.price)}</div></div>
        <span class="pill p-${c.status}">${c.status[0].toUpperCase()+c.status.slice(1)}</span>
      </div>`).join('')}
    </div>
  </div>`;
}

/* ═══ ANALYTICS — financials gated ═══ */
function renderAnalytics(){
  const lp=state.leadsByPlatform;const max=Math.max(...Object.values(lp));
  const days=state.avgDaysHist;const dmax=Math.max(...days);
  const months=['Jan','Feb','Mar','Apr','May','Jun'];
  const sales=[5,6,6,8,7,state.soldThisMonth];const smax=Math.max(...sales);
  const finStat=can('financials')
    ?`<div class="stat"><div class="stat-n">${fmt(state.soldThisMonth*640)}</div><div class="stat-l">Est. margin this month</div><div class="stat-d d-up">↑ vs. ${fmt(7*640)} in May</div></div>`
    :`<div class="stat"><div class="stat-n">&lt;38s</div><div class="stat-l">Your avg. reply time</div><div class="stat-d d-up">Fastest on the team 🏆</div></div>`;
  document.getElementById('s-analytics').innerHTML=`
  ${can('financials')?'':'<div class="ai-bar" style="cursor:default;margin-bottom:14px"><div class="ai-spark">👤</div><div class="ai-txt"><b>Sales view.</b> Margin and financial figures are visible to the owner only.</div></div>'}
  <div class="grid-stats">
    <div class="stat"><div class="stat-n">${days[days.length-1]} <span class="u">days</span></div><div class="stat-l">Avg. days-to-sell (Jun)</div><div class="stat-d d-up">↓ ${days[0]-days[days.length-1]} since Jan</div></div>
    <div class="stat"><div class="stat-n">${Object.values(lp).reduce((a,b)=>a+b,0)}</div><div class="stat-l">Leads this month</div><div class="stat-d d-up">↑ 31% vs. May</div></div>
    <div class="stat"><div class="stat-n">&lt;90s</div><div class="stat-l">Median lead response</div><div class="stat-d d-up">100% auto-acked</div></div>
    ${finStat}
  </div>
  <div class="grid2">
    <div class="panel"><div class="ph"><div class="pt">Days-to-sell since joining Revva</div></div>
      <div class="chart-card"><div class="cols">${days.map((d,i)=>`<div class="col"><div class="col-v">${d}</div><div class="col-bar ${i===days.length-1?'g':''}" style="height:${d/dmax*100}%"></div><div class="col-l">${months[i]}</div></div>`).join('')}</div>
      <div style="font-size:.62rem;color:var(--sub);margin-top:10px">UK average is <b>35 days</b>. You are <b style="color:var(--grn)">${35-days[days.length-1]} days faster</b>${can('financials')?' — worth ~'+fmt((35-days[days.length-1])*8*30)+'/year on a 30-car forecourt':''}.</div></div>
    </div>
    <div>
      <div class="panel" style="margin-bottom:16px"><div class="ph"><div class="pt">Leads by platform</div></div>
        <div class="chart-card">${Object.entries(lp).map(([k,v])=>`<div class="bar-row"><div class="bar-k">${PLATFORM_META[k].name}</div><div class="bar-track"><div class="bar-f" style="width:${v/max*100}%;background:${PLATFORM_META[k].bg}">${v}</div></div></div>`).join('')}</div>
      </div>
      <div class="panel"><div class="ph"><div class="pt">Cars sold per month</div></div>
        <div class="chart-card"><div class="cols" style="height:90px">${sales.map((s,i)=>`<div class="col"><div class="col-v">${s}</div><div class="col-bar ${i===sales.length-1?'g':''}" style="height:${s/smax*100}%"></div><div class="col-l">${months[i]}</div></div>`).join('')}</div></div>
      </div>
    </div>
  </div>`;
}

/* ═══ SETTINGS — owner only ═══ */
function renderLockedSettings(){
  document.getElementById('s-settings').innerHTML=`
  <div class="panel locked-panel">
    <div class="locked-ic">🔒</div>
    <div class="locked-t">Owner access required</div>
    <div class="locked-s">Platform connections, AI behaviour and dealership settings can only be changed by the business owner. You're signed in as <b>${user().name} — ${user().title}</b>.</div>
    <div style="margin-top:18px"><button class="btn btn-g" onclick="openRoleSheet()">Switch user</button></div>
  </div>`;
}
function renderSettings(){
  if(!can('settings')){renderLockedSettings();return;}
  document.getElementById('s-settings').innerHTML=`
  <div style="max-width:620px">
  <div class="panel" style="margin-bottom:16px">
    <div class="ph"><div class="pt">Dealership</div></div>
    <div class="set-row"><div class="set-k"><div class="set-t">City Motors</div><div class="set-s">Kirkstall Road, Leeds · 42-car forecourt · Growth £299/mo</div></div><button class="btn btn-g btn-sm" onclick="toast('Profile editing is in the full product','✓')">Edit</button></div>
  </div>
  <div class="panel" style="margin-bottom:16px">
    <div class="ph"><div class="pt">Team &amp; access</div></div>
    <div class="set-row"><div class="role-av" style="background:#0C0C0C;width:32px;height:32px;font-size:.58rem">JW</div><div class="set-k"><div class="set-t">James Walker — Owner</div><div class="set-s">Full access: pricing, settings, financials</div></div><span class="pill p-live">You</span></div>
    <div class="set-row"><div class="role-av" style="background:#7C3AED;width:32px;height:32px;font-size:.58rem">SC</div><div class="set-k"><div class="set-t">Sophie Carter — Sales</div><div class="set-s">Leads, stock, add vehicles · price changes need your approval</div></div><button class="btn btn-g btn-sm" onclick="toast('Permission editing is in the full product — roles: Owner, Manager, Sales','👤')">Edit role</button></div>
    <div class="set-row"><div class="set-k"><div class="set-t">Invite team member</div><div class="set-s">Each person gets their own login and role</div></div><button class="btn btn-g btn-sm" onclick="toast('Invite sent (demo) — they\u2019d receive an email to join City Motors','✉️')">+ Invite</button></div>
  </div>
  <div class="panel" style="margin-bottom:16px">
    <div class="ph"><div class="pt">Connected platforms</div></div>
    ${Object.entries(PLATFORM_META).map(([k,p])=>`
      <div class="set-row"><div class="pub-logo" style="background:${p.bg};width:30px;height:30px;font-size:.5rem;margin:0">${p.logo}</div>
      <div class="set-k"><div class="set-t">${p.name}</div><div class="set-s">${state.platforms[k]?'Connected — new listings publish here':'Disabled'}</div></div>
      <div class="toggle ${state.platforms[k]?'on':''}" onclick="togglePlatform('${k}')"></div></div>`).join('')}
  </div>
  <div class="panel">
    <div class="ph"><div class="pt">AI behaviour</div></div>
    <div class="set-row"><div class="set-k"><div class="set-t">Auto-reply to new leads</div><div class="set-s">Acknowledge every enquiry in under 90 seconds</div></div><div class="toggle ${state.autoReply?'on':''}" onclick="state.autoReply=!state.autoReply;renderSettings();toast(state.autoReply?'Auto-reply on':'Auto-reply off','✦')"></div></div>
    <div class="set-row"><div class="set-k"><div class="set-t">Nightly repricing scan</div><div class="set-s">Compare every live car to market comparables</div></div><div class="toggle on" onclick="toast('Stays on in the demo — it\u2019s the good bit','✦')"></div></div>
  </div></div>`;
}
function togglePlatform(k){
  if(!can('platformToggle')){toast('Platform changes are owner-only','🔒');return;}
  const on=Object.values(state.platforms).filter(Boolean).length;
  if(state.platforms[k]&&on===1){toast('Keep at least one platform connected','⚠');return;}
  state.platforms[k]=!state.platforms[k];
  renderSettings();syncChrome();
  toast(PLATFORM_META[k].name+(state.platforms[k]?' connected':' disabled'),'◎');
}

/* ═══ WEEKLY REPORT (owner) ═══ */
function openReport(){
  if(!can('report')){toast('Weekly report is owner-only','🔒');return;}
  const live=state.cars.filter(c=>c.status==='live');
  const newLeads=state.leads.filter(l=>l.status==='new').length;
  const recs=live.filter(c=>c.rec);
  const reqd=recs.filter(c=>c.rec.requested);
  const oldest=[...live].sort((a,b)=>b.days-a.days)[0];
  openModal('✦ Your week, written by Revva',`
    <h4>The headline</h4>${live.length} cars live, average listing age <b>${Math.round(live.reduce((a,c)=>a+c.days,0)/Math.max(live.length,1))} days</b> — well under the 35-day UK average. ${state.soldThisMonth} sold this month.
    <h4>What needs you</h4>${recs.length?`<b>${recs.length} pricing recommendation${recs.length>1?'s':''}</b> waiting${reqd.length?` — <b>${reqd.length} requested by Sophie</b> and awaiting your approval`:''}. `:''}${newLeads?`<b>${newLeads} lead${newLeads>1?'s':''}</b> auto-acknowledged, awaiting a personal reply.`:'Lead inbox clear.'}
    <h4>Watch closely</h4>${oldest?`The <b>${oldest.make} ${oldest.model}</b> at <b>${oldest.days} days</b> (~${fmt(oldest.days*8)} holding cost so far).`:'Nothing aging.'}
    <h4>The number that matters</h4>On pace for <b>${state.soldThisMonth+2} sales</b> this month — roughly <b>${fmt((state.soldThisMonth+2)*640)}</b> gross margin.
    <div style="margin-top:16px"><button class="btn btn-p btn-sm" onclick="closeModal();go('pricing')">Review pricing →</button></div>`);
}

/* ── responsive re-render + boot ── */
let _rz;window.addEventListener('resize',()=>{clearTimeout(_rz);_rz=setTimeout(rerender,180)});
go('dashboard');
</script>
